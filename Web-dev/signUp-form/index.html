<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Form</title>

    <link rel="stylesheet" href="index.css">
</head>

<body>


    <!-- Entire container -->
    <div class="formContainer">


        <div class="imgSection">

            <img src="./root.png" alt="overlay image" class="overlayImage">


            <figure class="imageWithCaption">

                <img src="./logan-voss.jpg" alt="image with caption" width="auto" class="mainImage">

                <figcaption> Photo by <a href="#">Logan Voss</a> on <a href="#">Unsplash</a></figcaption>



            </figure>

        </div>


        <div class="textSection">


            <div class="textArea">
                <h4>This is not a real online service! You know you need something like this in your life to help you
                    realize your deepest dreams.<br>
                    Sign up <em>now</em> to get started.
                </h4>

                <p> You <em>know</em> you want to. </p>



            </div>

            <form action=" example.com/path" method="post">

                <div class="formArea">

                    <h4>Let's do this! </h4>




                    <div class="form-grid">
                        <div class="form-group">
                            <label for="first_name"> *FIRST NAME</label>
                            <input type="text" class="styled-input" id="first_name" name="first_name"
                                pattern="[A-Za-z][A-Za-z\s\-']{1,29}" title="First name: letters only, 2-30 characters"
                                required>
                        </div>

                        <div class="form-group">
                            <label for="last_name"> *LAST NAME</label>
                            <input type="text" class="styled-input" id="last_name" name="last_name"
                                pattern="[A-Za-z][A-Za-z\s\-']{1,29}" title="Last name: letters only, 2-30 characters"
                                required>
                        </div>

                        <div class="form-group">
                            <label for="email">*EMAIL</label>
                            <input type="email" class="styled-input" id="email" name="email"
                                placeholder="name@example.com" required>
                        </div>

                        <div class="form-group">
                            <label for="phone">*PHONE NUMBER</label>
                            <input type="tel" class="styled-input" id="phone" name="phone" pattern="\+?[1-9]\d{1,14}"
                                title="Phone: International format (+1234567890) or local digits"
                                placeholder="+1234567890" required>
                        </div>

                        <div class="form-group">
                            <label for="password"> *PASSWORD</label>
                            <input type="password" class="styled-input" id="password" name="password" required>
                        </div>

                        <div class="form-group">
                            <label for="confirm_password"> *CONFIRM PASSWORD</label>
                            <input type="password" class="styled-input" id="confirm_password" name="confirm_password"
                                required>
                        </div>
                    </div>

                </div>


                <div class="buttonArea">

                    <button type="submit"> Create Account</button>


                    <h5>Already have an account? <a href="#">Log in</a></h5>



                </div>
            </form>

        </div>


    </div>








    <script src="index.js"></script>
</body>

</html>
